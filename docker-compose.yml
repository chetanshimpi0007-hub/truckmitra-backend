version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: truckmitra-db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: truckmitra
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7.0-alpine
    container_name: truckmitra-cache
    ports:
      - "6379:6379"

  backend:
    build: ./Truckmitra-backend
    container_name: truckmitra-api
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/truckmitra?useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_REDIS_HOST=redis
    depends_on:
      - mysql
      - redis

  frontend:
    build: ./Truckmitra-frontend
    container_name: truckmitra-ui
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
