spring.application.name=TruckMitra

# ==========================
# 1. Server Configuration
# ==========================
server.port=${PORT:8080}
spring.devtools.restart.enabled=false

# ==========================
# 2. PostgreSQL Database Configuration
# ==========================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Physical Naming Strategy
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ==========================
# 3. JWT Configuration
# ==========================
application.security.jwt.secret-key=${JWT_SECRET_KEY}
# 30 Minutes (Access Token)
application.security.jwt.expiration=1800000
# 30 Days (Refresh Token)
application.security.jwt.refresh-token.expiration=2592000000

# ==========================
# 4. Twilio Configuration
# ==========================
twilio.account.sid=${TWILIO_ACCOUNT_SID}
twilio.auth.token=${TWILIO_AUTH_TOKEN}
twilio.verify.service.sid=${TWILIO_VERIFY_SERVICE_SID}
twilio.phone.number=${TWILIO_PHONE_NUMBER}

# ==========================
# 5. OAuth2 Configuration
# ==========================
# Google OAuth2 Settings
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google

# Facebook OAuth2 Settings
spring.security.oauth2.client.registration.facebook.client-id=${FACEBOOK_CLIENT_ID}
spring.security.oauth2.client.registration.facebook.client-secret=${FACEBOOK_CLIENT_SECRET}
spring.security.oauth2.client.registration.facebook.redirect-uri={baseUrl}/login/oauth2/code/facebook
spring.security.oauth2.client.registration.facebook.scope=email,public_profile

# ==========================
# 6. Email (SMTP) Configuration
# ==========================
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ==========================
# 7. File Upload & Cloudinary Config
# ==========================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
file.upload-dir=./uploads
file.base-url=${FILE_BASE_URL}
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# ==========================
# 8. Razorpay
# ==========================
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}

# ==========================
# 9. Async Thread Pool
# ==========================
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=100

# ==========================
# 10. Logging
# ==========================
logging.level.org.springframework.security=INFO
logging.level.com.truckmitra=INFO

# ==========================
# 11. Socket relay server
# ==========================
socket.server.url=${SOCKET_SERVER_URL}

# ==========================
# 12. Flyway configuration
# ==========================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false
spring.flyway.repair-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ==========================
# 13. Swagger / OpenAPI
# ==========================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
