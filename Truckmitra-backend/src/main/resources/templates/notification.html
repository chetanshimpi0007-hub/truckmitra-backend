<!-- src/main/resources/templates/notification.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>TruckMitra Notification</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background-color: #2c3e50; color: white; padding: 20px; text-align: center; }
        .content { padding: 30px; background-color: #f9f9f9; }
        .message { font-size: 18px; margin: 20px 0; }
        .footer { margin-top: 30px; text-align: center; color: #777; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>TruckMitra Notification</h2>
        </div>
        
        <div class="content">
            <p>Dear User,</p>
            
            <div class="message" th:text="${message}">
                Your notification message here
            </div>
            
            <p>Thank you for using TruckMitra!</p>
        </div>
        
        <div class="footer">
            <p>© 2024 TruckMitra. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
